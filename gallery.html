<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

    <div class="stars"></div>
        <div id="app-container">

        
    <div class="page">
        <button class="back" onclick="backHome()">
            ← Kembali
        </button>

        <header>
            <h1>Galerii</h1>
            <p></p>
        </header>

        <div class="gallery">
            <div class="photo">
                <img src="images/1.jpeg" alt="Foto 1">
            </div>
            <div class="photo">
                <img src="images/2.jpeg" alt="Foto 2">
            </div>
            <div class="photo">
                <img src="images/4.jpeg" alt="Foto 3">
            </div>
            <div class="photo">
                <img src="images/5.jpeg" alt="Foto 4">
            </div>
        </div>

        <div id="viewer">
            <span id="close">&times;</span>
            <img id="viewerImg" src="" alt="Preview">
        </div>
    </div>
</div>
    <script src="js/music.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
